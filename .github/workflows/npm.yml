name: Publish to npm

on:
  push:
    tags:
      - 'v*'

# NOTE: npm publish is done locally via .local/publish.sh
# Run: .local/publish.sh

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Informational note
        run: |
          echo "npm publish is handled locally via .local/publish.sh"
          echo "On your machine run: .local/publish.sh"
