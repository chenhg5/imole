name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@4

      - name: Set up Go
        uses: actions/setup-go@5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          make release
          ls -lh bin/

      - name: Generate checksums
        run: |
          cd bin
          sha256sum imole-darwin-* > SHA256SUMS
          cat SHA256SUMS

      - name: Upload artifacts
        uses: actions/upload-artifact@4
        with:
          name: binaries
          path: bin/*
          retention-days: 1

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@4
        with:
          name: binaries
          path: bin

      - name: Display artifacts
        run: ls -lh bin/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: bin/*
          generate_release_notes: true

  update-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@4
        with:
          repository: chenhg5/homebrew-tap
          path: homebrew-tap

      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Download checksums
        run: |
          curl -fsSL "https://github.com/chenhg5/imole/releases/download/${GITHUB_REF#refs/tags/}/SHA256SUMS" -o /tmp/SHA256SUMS

      - name: Get SHA256 for arm64
        run: |
          ARM_SHA=$(awk '/imole-darwin-arm64/ {print $1}' /tmp/SHA256SUMS)
          echo "arm_sha=${ARM_SHA}" >> $GITHUB_OUTPUT
        id: shas

      - name: Get SHA256 for amd64
        run: |
          AMD_SHA=$(awk '/imole-darwin-amd64/ {print $1}' /tmp/SHA256SUMS)
          echo "amd_sha=${AMD_SHA}" >> $GITHUB_OUTPUT

      - name: Update formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ github.ref_name }}
          ARM_SHA: ${{ steps.shas.outputs.arm_sha }}
          AMD_SHA: ${{ steps.shas.outputs.amd_sha }}
        run: |
          sed -i.bak \
            -e "s|version \".*\"|version \"${VERSION}\"|" \
            -e "s|releases/download/[^/]+/imole-darwin-arm64|releases/download/${TAG}/imole-darwin-arm64|" \
            -e "s|releases/download/[^/]+/imole-darwin-amd64|releases/download/${TAG}/imole-darwin-amd64|" \
            -e "s|sha256 \"placeholder\"|sha256 \"${ARM_SHA}\"|" \
            -e "T" \
            homebrew-tap/Formula/imole.rb

          # Fix second sha256 for amd64 (can't use same placeholder approach)
          sed -i '' "s|sha256 \"${ARM_SHA}\"|sha256 \"${AMD_SHA}\"|2" homebrew-tap/Formula/imole.rb 2>/dev/null || true

          # Show diff
          diff homebrew-tap/Formula/imole.rb.bak homebrew-tap/Formula/imole.rb || true

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/imole.rb
          git commit -m "imole ${{ steps.version.outputs.version }}"
          git push origin master