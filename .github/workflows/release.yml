name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@4

      - name: Set up Go
        uses: actions/setup-go@5
        with:
          go-version-file: go.mod

      - name: Build all binaries
        run: make release

      - name: Generate checksums
        run: |
          cd bin
          sha256sum imole-* > SHA256SUMS
          cat SHA256SUMS

      - name: Upload artifacts
        uses: actions/upload-artifact@4
        with:
          name: binaries
          path: bin/*

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@4
        with:
          name: binaries
          path: bin

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: bin/*
          generate_release_notes: true

  update-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@4
        with:
          repository: chenhg5/homebrew-tap
          path: homebrew-tap

      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Download checksums
        run: |
          curl -fsSL "https://github.com/chenhg5/imole/releases/download/${GITHUB_REF#refs/tags/}/SHA256SUMS" -o /tmp/SHA256SUMS

      - name: Get SHA256 for arm64
        id: shas
        run: |
          ARM_SHA=$(awk '/imole-darwin-arm64/ {print $1}' /tmp/SHA256SUMS)
          echo "arm_sha=${ARM_SHA}" >> $GITHUB_OUTPUT

      - name: Get SHA256 for amd64
        run: |
          AMD_SHA=$(awk '/imole-darwin-amd64/ {print $1}' /tmp/SHA256SUMS)
          echo "amd_sha=${AMD_SHA}" >> $GITHUB_OUTPUT

      - name: Update formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ github.ref_name }}
          ARM_SHA: ${{ steps.shas.outputs.arm_sha }}
          AMD_SHA: ${{ steps.shas.outputs.amd_sha }}
        run: |
          sed -i \
            -e "s|version \".*\"|version \"${VERSION}\"|" \
            -e "s|releases/download/[^/]+/imole-darwin-arm64|releases/download/${TAG}/imole-darwin-arm64|" \
            -e "s|releases/download/[^/]+/imole-darwin-amd64|releases/download/${TAG}/imole-darwin-amd64|" \
            homebrew-tap/Formula/imole.rb

          # Update sha256 values (first occurrence = arm64, second = amd64)
          awk -v arm="$ARM_SHA" -v amd="$AMD_SHA" '
            /sha256/ && !arm_done { sub(/sha256 ".*"/, "sha256 \"" arm "\""); arm_done=1 }
            /sha256/ && arm_done && !amd_done { sub(/sha256 ".*"/, "sha256 \"" amd "\""); amd_done=1 }
            { print }
          ' homebrew-tap/Formula/imole.rb > /tmp/imole.rb.tmp
          mv /tmp/imole.rb.tmp homebrew-tap/Formula/imole.rb

          diff homebrew-tap/Formula/imole.rb.bak homebrew-tap/Formula/imole.rb 2>/dev/null || true

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/imole.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "imole ${{ steps.version.outputs.version }}"
          git push origin master