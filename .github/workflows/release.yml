name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build all binaries
        run: make release

      - name: Generate checksums
        run: |
          cd bin
          sha256sum imole-* > SHA256SUMS
          cat SHA256SUMS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/*

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: bin

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: bin/*
          generate_release_notes: true

  update-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      TAP_REPO: chenhg5/homebrew-tap
    steps:
      - name: Validate Homebrew tap token
        env:
          HOMEBREW_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TOKEN}" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN is not configured"
            exit 1
          fi

          status=$(curl -sS -o /tmp/tap.json -w "%{http_code}" \
            -H "Authorization: Bearer ${HOMEBREW_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${TAP_REPO}")

          if [ "${status}" != "200" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN cannot access ${TAP_REPO}; GitHub API returned ${status}"
            cat /tmp/tap.json
            exit 1
          fi

          can_push=$(jq -r '.permissions.push // false' /tmp/tap.json)
          if [ "${can_push}" != "true" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN can read ${TAP_REPO} but does not have push permission"
            jq '{full_name, permissions}' /tmp/tap.json
            exit 1
          fi

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: chenhg5/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          persist-credentials: false

      - name: Detect tap branch
        id: tap
        run: |
          branch=$(git -C homebrew-tap branch --show-current)
          if [ -z "${branch}" ]; then
            branch=$(git -C homebrew-tap remote show origin | awk '/HEAD branch/ {print $NF}')
          fi
          echo "branch=${branch}" >> $GITHUB_OUTPUT

      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Download checksums
        run: |
          curl -fsSL "https://github.com/chenhg5/imole/releases/download/${GITHUB_REF#refs/tags/}/SHA256SUMS" -o /tmp/SHA256SUMS

      - name: Get SHA256 values
        id: shas
        run: |
          ARM_SHA=$(awk '/imole-darwin-arm64/ {print $1}' /tmp/SHA256SUMS)
          AMD_SHA=$(awk '/imole-darwin-amd64/ {print $1}' /tmp/SHA256SUMS)
          if [ -z "${ARM_SHA}" ] || [ -z "${AMD_SHA}" ]; then
            echo "::error::Missing darwin checksums in SHA256SUMS"
            cat /tmp/SHA256SUMS
            exit 1
          fi
          echo "arm_sha=${ARM_SHA}" >> $GITHUB_OUTPUT
          echo "amd_sha=${AMD_SHA}" >> $GITHUB_OUTPUT

      - name: Update formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ github.ref_name }}
          ARM_SHA: ${{ steps.shas.outputs.arm_sha }}
          AMD_SHA: ${{ steps.shas.outputs.amd_sha }}
        run: |
          test -f homebrew-tap/Formula/imole.rb

          sed -i \
            -e "s|version \".*\"|version \"${VERSION}\"|" \
            -e "s|releases/download/[^/]+/imole-darwin-arm64|releases/download/${TAG}/imole-darwin-arm64|" \
            -e "s|releases/download/[^/]+/imole-darwin-amd64|releases/download/${TAG}/imole-darwin-amd64|" \
            homebrew-tap/Formula/imole.rb

          # Update sha256 values (first occurrence = arm64, second = amd64)
          awk -v arm="$ARM_SHA" -v amd="$AMD_SHA" '
            /sha256/ && !arm_done { sub(/sha256 ".*"/, "sha256 \"" arm "\""); arm_done=1 }
            /sha256/ && arm_done && !amd_done { sub(/sha256 ".*"/, "sha256 \"" amd "\""); amd_done=1 }
            { print }
          ' homebrew-tap/Formula/imole.rb > /tmp/imole.rb.tmp
          mv /tmp/imole.rb.tmp homebrew-tap/Formula/imole.rb

          git -C homebrew-tap diff -- Formula/imole.rb

      - name: Commit and push
        env:
          HOMEBREW_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${HOMEBREW_TOKEN}@github.com/chenhg5/homebrew-tap.git
          git add Formula/imole.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "imole ${{ steps.version.outputs.version }}"
          git push origin HEAD:${{ steps.tap.outputs.branch }}
